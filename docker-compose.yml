version: "3.9"

services:
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  auth-service:
    build: ./auth-service
    environment:
      PORT: 4001
      JWT_SECRET: supersecret
      RABBITMQ_URL: amqp://rabbitmq:5672
      RABBITMQ_EXCHANGE: shop.events
    ports:
      - "4001:4001"
    depends_on:
      - rabbitmq

  user-service:
    build: ./user-service
    environment:
      PORT: 4002
      JWT_SECRET: supersecret
      RABBITMQ_URL: amqp://rabbitmq:5672
      RABBITMQ_EXCHANGE: shop.events
    ports:
      - "4002:4002"
    depends_on:
      - rabbitmq

  product-service:
    build: ./product-service
    environment:
      PORT: 4003
      JWT_SECRET: supersecret
      REDIS_URL: redis://redis:6379
      CACHE_TTL: 120
    ports:
      - "4003:4003"
    depends_on:
      - redis

  order-service:
    build: ./order-service
    environment:
      PORT: 4004
      JWT_SECRET: supersecret
      RABBITMQ_URL: amqp://rabbitmq:5672
      RABBITMQ_EXCHANGE: shop.events
    ports:
      - "4004:4004"
    depends_on:
      - rabbitmq

  notification-service:
    build: ./notification-service
    environment:
      RABBITMQ_URL: amqp://rabbitmq:5672
      RABBITMQ_EXCHANGE: shop.events
    depends_on:
      - rabbitmq